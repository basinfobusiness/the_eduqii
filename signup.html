<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
  <script src="assets/js/color-modes.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #f8f9fa;
    }
    .signup-card {
      max-width: 540px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card signup-card shadow-sm">
    <div class="card-body">
      <h1 class="h4 mb-3">Create your account</h1>
      <p class="text-muted">Sign up to access tutorials, quizzes, and personalized progress tracking.</p>
      <form id="signupForm">
        <div class="mb-3">
          <label for="fullName" class="form-label">Full name</label>
          <input type="text" class="form-control" id="fullName" placeholder="Jane Doe" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Create a password" required>
        </div>
        <div class="mb-3">
          <label for="goal" class="form-label">Learning goal</label>
          <input type="text" class="form-control" id="goal" placeholder="e.g. Improve exam readiness">
        </div>
        <button type="submit" class="btn btn-bd-primary w-100">Sign Up</button>
      </form>
      <div id="signupSuccess" class="alert alert-success mt-3 d-none" role="alert">
        Your account has been created! You can now start exploring tutorials.
      </div>
      <p class="mt-3 mb-0 text-muted small">Already have an account? <a href="index.html">Return to home</a>.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    $('#signupForm').on('submit', function(event) {
      event.preventDefault();
      $('#signupSuccess').removeClass('d-none');
      $('#signupForm')[0].reset();
    });
  </script>
</body>
</html>
