<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.css" />
  
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>
</head>
<body>
    <div class="container mt-5">
        <table class="table table-striped" id="leaderboard">
            <thead>
                <tr>
                    <th class="text-capitalize">position</th>
                    <th class="text-capitalize">full name</th>
                    <th class="text-capitalize">description</th>
                    <th class="text-capitalize">points</th>
                    <th class="text-capitalize">badge</th>
                    <th class="text-capitalize">actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <script src="https://cdn.datatables.net/2.3.8/js/dataTables.dataTables.min.js"></script> -->
    <script>
        $(document).ready(function() {
            $('#leaderboard').DataTable();
        });
    </script>
</body>
</html>
